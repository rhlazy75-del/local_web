<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-CAM Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c0f;
            --surface: #111418;
            --panel: #161b22;
            --border: #21262d;
            --accent: #00ff88;
            --accent2: #00b8ff;
            --warn: #ff4757;
            --text: #e6edf3;
            --muted: #8b949e;
            --cam1: #00ff88;
            --cam2: #00b8ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 255, 136, .4);
        }

        .status-bar {
            display: flex;
            gap: 18px;
            font-size: .7rem;
            color: var(--muted);
            align-items: center;
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--warn);
            margin-right: 5px;
            animation: blink 1.4s infinite;
        }

        .status-dot.active {
            background: var(--accent);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        /* Server status badge */
        .srv-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .65rem;
            letter-spacing: 1px;
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all .3s;
        }

        .srv-badge.running {
            border-color: var(--accent);
            color: var(--accent);
        }

        .srv-badge.running::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink .8s infinite;
        }

        /* Grid root */
        .root {
            display: grid;
            grid-template-rows: auto auto;
            gap: 0;
            height: calc(100vh - 57px);
        }

        /* TOP: Two cameras */
        .cam-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            height: 52vh;
            min-height: 260px;
        }

        .cam-panel {
            background: var(--panel);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .cam-label {
            position: absolute;
            top: 0;
            left: 0;
            padding: 6px 14px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cam-label.c1 {
            color: var(--cam1);
            text-shadow: 0 0 12px rgba(0, 255, 136, .5);
        }

        .cam-label.c2 {
            color: var(--cam2);
            text-shadow: 0 0 12px rgba(0, 184, 255, .5);
        }

        .cam-frame {
            flex: 1;
            position: relative;
            background: #050608;
            overflow: hidden;
        }

        .cam-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity .3s;
        }

        .cam-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0, 0, 0, .18) 3px, rgba(0, 0, 0, .18) 4px);
            pointer-events: none;
            z-index: 2;
        }

        .cam-offline {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: .75rem;
            z-index: 3;
            gap: 8px;
            background: #050608;
        }

        .cam-offline svg {
            opacity: .3;
        }

        .cam-frame .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            z-index: 4;
        }

        .cam-frame .corner.tl {
            top: 8px;
            left: 8px;
            border-top: 2px solid;
            border-left: 2px solid;
        }

        .cam-frame .corner.tr {
            top: 8px;
            right: 8px;
            border-top: 2px solid;
            border-right: 2px solid;
        }

        .cam-frame .corner.bl {
            bottom: 8px;
            left: 8px;
            border-bottom: 2px solid;
            border-left: 2px solid;
        }

        .cam-frame .corner.br {
            bottom: 8px;
            right: 8px;
            border-bottom: 2px solid;
            border-right: 2px solid;
        }

        .c1 .corner {
            border-color: rgba(0, 255, 136, .4);
        }

        .c2 .corner {
            border-color: rgba(0, 184, 255, .4);
        }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition: opacity .05s;
        }

        .flash-overlay.flash {
            opacity: .6;
        }

        /* BOTTOM: controls + gallery */
        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            overflow: hidden;
            height: calc(48vh - 57px);
            min-height: 200px;
        }

        /* Controls */
        .ctrl-panel {
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px;
        }

        .ctrl-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: .9rem;
            letter-spacing: 3px;
            color: var(--muted);
            text-align: center;
        }

        .btn-capture {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all .2s;
            overflow: hidden;
        }

        .btn-capture::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            background: rgba(0, 255, 136, .07);
            transition: background .2s;
        }

        .btn-capture.active {
            border-color: var(--warn);
            box-shadow: 0 0 0 8px rgba(255, 71, 87, .15), 0 0 30px rgba(255, 71, 87, .3);
            animation: pulse-ring 1.2s infinite;
        }

        .btn-capture.active::before {
            background: rgba(255, 71, 87, .1);
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, .4)
            }

            70% {
                box-shadow: 0 0 0 14px rgba(255, 71, 87, 0)
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0)
            }
        }

        .btn-capture:hover:not(.active) {
            background: rgba(0, 255, 136, .05);
            box-shadow: 0 0 20px rgba(0, 255, 136, .2);
        }

        .btn-capture:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .btn-icon {
            font-size: 1.8rem;
            line-height: 1;
            z-index: 1;
        }

        .btn-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: .75rem;
            letter-spacing: 2px;
            z-index: 1;
            color: var(--accent);
            transition: color .2s;
        }

        .btn-capture.active .btn-label {
            color: var(--warn);
        }

        .meta-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            max-width: 240px;
        }

        .meta-box {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            text-align: center;
        }

        .meta-box .val {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }

        .meta-box .key {
            font-size: .6rem;
            color: var(--muted);
            margin-top: 2px;
            letter-spacing: 1px;
        }

        .interval-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .7rem;
            color: var(--muted);
        }

        .interval-row select {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: .7rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }

        /* Gallery */
        .gallery-panel {
            background: var(--surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .gallery-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: .9rem;
            letter-spacing: 3px;
            color: var(--muted);
        }

        .gallery-count {
            font-size: .65rem;
            color: var(--accent);
        }

        .gallery-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .gallery-list::-webkit-scrollbar {
            width: 4px;
        }

        .gallery-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .gallery-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .gallery-item {
            display: grid;
            grid-template-columns: 28px 1fr 60px 60px;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all .15s;
            font-size: .68rem;
        }

        .gallery-item:hover {
            background: var(--panel);
            border-color: var(--border);
        }

        .gallery-item.selected {
            background: var(--panel);
            border-color: var(--accent);
        }

        .thumb {
            width: 28px;
            height: 20px;
            object-fit: cover;
            border-radius: 3px;
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .item-name {
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-cam {
            font-size: .6rem;
        }

        .item-cam.c1 {
            color: var(--cam1);
        }

        .item-cam.c2 {
            color: var(--cam2);
        }

        .item-time {
            color: var(--muted);
            font-size: .6rem;
        }

        .gallery-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: .7rem;
            gap: 8px;
            opacity: .5;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .92);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            padding: 24px;
            backdrop-filter: blur(8px);
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox-img {
            max-width: min(90vw, 900px);
            max-height: 75vh;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 0 60px rgba(0, 0, 0, .8);
        }

        .lightbox-meta {
            font-size: .75rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.8;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }

        .lightbox-close:hover {
            border-color: var(--warn);
            color: var(--warn);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        .toast {
            background: var(--panel);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: .72rem;
            animation: slideIn .2s ease;
            max-width: 280px;
        }

        .toast.error {
            border-left-color: var(--warn);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">CAMCTL</div>
        <div class="status-bar">
            <span><span class="status-dot" id="dot1"></span>CAM-01</span>
            <span><span class="status-dot" id="dot2"></span>CAM-02</span>
            <span class="srv-badge" id="srvBadge">STOPPED</span>
            <span id="clock" style="color:var(--text)">--:--:--</span>
        </div>
    </header>

    <div class="root">
        <!-- TOP: cameras -->
        <div class="cam-row">
            <!-- CAM 1 -->
            <div class="cam-panel c1">
                <div class="cam-label c1"><span>◉</span> CAM-01</div>
                <div class="cam-frame" id="frame1">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                    <div class="flash-overlay" id="flash1"></div>
                    <div class="cam-offline" id="offline1">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path
                                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                            <circle cx="12" cy="13" r="4" />
                        </svg>
                        <span>OFFLINE</span>
                    </div>
                    <img id="img1" src="" alt="CAM 1" style="display:none" onload="onImgLoad(1)"
                        onerror="onImgError(1)">
                </div>
            </div>

            <!-- CAM 2 -->
            <div class="cam-panel c2">
                <div class="cam-label c2"><span>◉</span> CAM-02</div>
                <div class="cam-frame" id="frame2">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                    <div class="flash-overlay" id="flash2"></div>
                    <div class="cam-offline" id="offline2">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path
                                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                            <circle cx="12" cy="13" r="4" />
                        </svg>
                        <span>OFFLINE</span>
                    </div>
                    <img id="img2" src="" alt="CAM 2" style="display:none" onload="onImgLoad(2)"
                        onerror="onImgError(2)">
                </div>
            </div>
        </div>

        <!-- BOTTOM: controls + gallery -->
        <div class="bottom-row">
            <!-- Controls -->
            <div class="ctrl-panel">
                <div class="ctrl-title">CAPTURE CONTROL</div>

                <button class="btn-capture" id="btnCapture" onclick="toggleCapture()">
                    <span class="btn-icon" id="btnIcon">📷</span>
                    <span class="btn-label" id="btnLabel">START</span>
                </button>

                <div class="interval-row">
                    <span>INTERVAL</span>
                    <select id="intervalSel">
                        <option value="5">5s</option>
                        <option value="10" selected>10s</option>
                        <option value="30">30s</option>
                        <option value="60">60s</option>
                    </select>
                </div>

                <div class="meta-info">
                    <div class="meta-box">
                        <div class="val" id="metaCount">0</div>
                        <div class="key">TOTAL FILES</div>
                    </div>
                    <div class="meta-box">
                        <div class="val" id="metaInterval">10s</div>
                        <div class="key">INTERVAL</div>
                    </div>
                </div>
            </div>

            <!-- Gallery -->
            <div class="gallery-panel">
                <div class="gallery-header">
                    <div class="gallery-title">CAPTURED IMAGES</div>
                    <div class="gallery-count" id="galCount">0 files</div>
                </div>
                <div class="gallery-list" id="galList">
                    <div class="gallery-empty" id="galEmpty">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                        <span>No images yet</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <img class="lightbox-img" id="lbImg" src="" alt="">
        <div class="lightbox-meta" id="lbMeta"></div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toasts"></div>

    <script>
        // ======================================================
        // State
        // ======================================================
        let serverRunning = false;      // reflects actual server loop state
        let selectedItem = null;
        let allImages = [];         // full list from /api/images
        let previewTimer = null;
        let galleryTimer = null;

        // ======================================================
        // Clock
        // ======================================================
        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString('th-TH', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ======================================================
        // Live camera preview
        // ======================================================
        function refreshPreview(camId) {
            const img = document.getElementById(`img${camId}`);
            img.src = `/image/${camId}?t=${Date.now()}`;
            img.style.display = 'block';
        }
        function onImgLoad(camId) {
            document.getElementById(`offline${camId}`).style.display = 'none';
            document.getElementById(`img${camId}`).style.display = 'block';
            document.getElementById(`dot${camId}`).classList.add('active');
        }
        function onImgError(camId) {
            document.getElementById(`offline${camId}`).style.display = 'flex';
            document.getElementById(`img${camId}`).style.display = 'none';
            document.getElementById(`dot${camId}`).classList.remove('active');
        }

        // Refresh previews every 2 s
        previewTimer = setInterval(() => { refreshPreview(1); refreshPreview(2); }, 2000);
        refreshPreview(1);
        refreshPreview(2);

        // ======================================================
        // Toggle capture — calls /api/start or /api/stop
        // ======================================================
        async function toggleCapture() {
            const btn = document.getElementById('btnCapture');
            const icon = document.getElementById('btnIcon');
            const lbl = document.getElementById('btnLabel');
            btn.disabled = true;

            try {
                if (!serverRunning) {
                    // ── START ──
                    const intervalSec = parseInt(document.getElementById('intervalSel').value);
                    document.getElementById('metaInterval').textContent = `${intervalSec}s`;

                    const resp = await fetch('/api/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ interval: intervalSec })
                    });
                    const data = await resp.json();

                    if (data.status === 'started' || data.status === 'already_running') {
                        serverRunning = true;
                        btn.classList.add('active');
                        icon.textContent = '⏹';
                        lbl.textContent = 'STOP';
                        updateServerBadge(true);
                        toast('▶ เริ่มระบบถ่ายภาพ');
                        // Poll gallery faster while running
                        startGalleryPolling(intervalSec * 1000);
                    }
                } else {
                    // ── STOP ──
                    await fetch('/api/stop', { method: 'POST' });
                    serverRunning = false;
                    btn.classList.remove('active');
                    icon.textContent = '📷';
                    lbl.textContent = 'START';
                    updateServerBadge(false);
                    toast('⏹ หยุดระบบ');
                    stopGalleryPolling();
                    // Do one final gallery refresh to catch last images
                    await loadGallery();
                }
            } catch (err) {
                toast('❌ เชื่อมต่อ server ไม่ได้', true);
            }

            btn.disabled = false;
        }

        // ======================================================
        // Server badge
        // ======================================================
        function updateServerBadge(running) {
            const badge = document.getElementById('srvBadge');
            badge.textContent = running ? 'RUNNING' : 'STOPPED';
            badge.classList.toggle('running', running);
        }

        // ======================================================
        // Flash animation (visual feedback only)
        // ======================================================
        function flashFrame(camId) {
            const el = document.getElementById(`flash${camId}`);
            el.classList.add('flash');
            setTimeout(() => el.classList.remove('flash'), 150);
        }

        // ======================================================
        // Gallery — load from /api/images (reads upload_2cam folder)
        // ======================================================
        async function loadGallery() {
            try {
                const resp = await fetch('/api/images');
                const data = await resp.json();
                const prev = allImages.length;
                allImages = data.images || [];

                // Flash cameras if new images arrived while running
                if (serverRunning && allImages.length > prev) {
                    flashFrame(1); flashFrame(2);
                }

                renderGallery();
                document.getElementById('metaCount').textContent = allImages.length;
            } catch (e) {
                // silently ignore network errors during poll
            }
        }

        function startGalleryPolling(intervalMs) {
            stopGalleryPolling();
            // Poll at the same rate as the capture interval (minimum 3 s)
            galleryTimer = setInterval(loadGallery, Math.max(intervalMs, 3000));
        }

        function stopGalleryPolling() {
            if (galleryTimer) { clearInterval(galleryTimer); galleryTimer = null; }
        }

        // ======================================================
        // Render gallery list
        // ======================================================
        function renderGallery() {
            const list = document.getElementById('galList');
            const empty = document.getElementById('galEmpty');
            document.getElementById('galCount').textContent = `${allImages.length} files`;

            // Remove old rows but keep galEmpty node
            Array.from(list.children).forEach(child => {
                if (child !== empty) child.remove();
            });

            if (allImages.length === 0) {
                empty.style.display = 'flex';
                return;
            }
            empty.style.display = 'none';

            allImages.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'gallery-item' + (selectedItem === idx ? ' selected' : '');
                div.onclick = () => openLightbox(idx);

                const ts = item.timestamp || '';
                // timestamp format: YYYYMMDD_HHMMSS
                const timeStr = ts.length >= 15
                    ? `${ts.slice(9, 11)}:${ts.slice(11, 13)}:${ts.slice(13, 15)}`
                    : '--:--:--';

                div.innerHTML = `
      <img class="thumb" src="/saved/${item.filename}" alt="" onerror="this.style.opacity='.2'">
      <span class="item-name">${item.filename}</span>
      <span class="item-cam ${item.cam_id === 1 ? 'c1' : 'c2'}">CAM-0${item.cam_id}</span>
      <span class="item-time">${timeStr}</span>
    `;
                list.appendChild(div);
            });
        }

        // ======================================================
        // Lightbox
        // ======================================================
        function openLightbox(idx) {
            selectedItem = idx;
            const item = allImages[idx];
            const img = document.getElementById('lbImg');
            const meta = document.getElementById('lbMeta');

            img.src = `/saved/${item.filename}`;
            img.onerror = () => { img.src = `/image/${item.cam_id}?t=${Date.now()}`; };

            meta.innerHTML = `
    <strong style="color:var(--text)">${item.filename}</strong><br>
    <span style="color:var(${item.cam_id === 1 ? '--cam1' : '--cam2'})">CAM-0${item.cam_id}</span>
    &nbsp;·&nbsp; ${item.timestamp}
  `;

            document.getElementById('lightbox').classList.add('open');
            renderGallery();
        }

        function closeLightbox(e) {
            if (!e || e.target === document.getElementById('lightbox')) {
                document.getElementById('lightbox').classList.remove('open');
                selectedItem = null;
                renderGallery();
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });

        // ======================================================
        // Toast
        // ======================================================
        function toast(msg, isError = false) {
            const el = document.createElement('div');
            el.className = 'toast' + (isError ? ' error' : '');
            el.textContent = msg;
            document.getElementById('toasts').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // ======================================================
        // Init — check server state + load existing images
        // ======================================================
        async function init() {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                if (data.running) {
                    // Server was already running (e.g. page refresh)
                    serverRunning = true;
                    const btn = document.getElementById('btnCapture');
                    btn.classList.add('active');
                    document.getElementById('btnIcon').textContent = '⏹';
                    document.getElementById('btnLabel').textContent = 'STOP';
                    updateServerBadge(true);
                    document.getElementById('metaInterval').textContent = `${data.interval}s`;
                    startGalleryPolling(data.interval * 1000);
                }
            } catch (e) { /* ignore */ }

            // Always load existing images from upload_2cam on startup
            await loadGallery();
        }

        init();
    </script>
</body>

</html>
