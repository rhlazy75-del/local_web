<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESP32-CAM Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f11;
            --surface: #161a1e;
            --card: #1c2127;
            --border: #2a3040;
            --accent: #00c896;
            --text: #e8edf3;
            --muted: #6b7a8d;
            --success: #00c896;
            --error: #ff4d4d;
            --partial: #ffb347;
            --font: 'IBM Plex Sans Thai', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
            --radius: 10px;
            --radius-lg: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
        }

        .logo-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        header h1 {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #live-clock {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--accent);
        }

        /* Main */
        main {
            flex: 1;
            padding: 28px 32px;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        /* Camera Grid */
        .cam-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        @media (max-width: 680px) {
            .cam-grid {
                grid-template-columns: 1fr;
            }
        }

        .cam-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .cam-card.active {
            border-color: var(--accent);
        }

        .cam-header {
            padding: 11px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .cam-badge {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(0, 200, 150, 0.12);
            color: var(--accent);
            letter-spacing: 0.08em;
        }

        .cam-ip {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        .cam-status-dot {
            margin-left: auto;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.4s, box-shadow 0.4s;
        }

        .cam-status-dot.ok {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .cam-status-dot.err {
            background: var(--error);
            box-shadow: 0 0 6px var(--error);
        }

        /* Image area */
        .cam-image-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #0a0c0e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .cam-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s;
        }

        .cam-image-wrap img.loading {
            opacity: 0.3;
        }

        .cam-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--muted);
        }

        .cam-placeholder svg {
            opacity: 0.3;
        }

        .cam-placeholder span {
            font-size: 12px;
            font-family: var(--mono);
        }

        /* Overlay timestamp */
        .img-ts {
            position: absolute;
            bottom: 8px;
            right: 10px;
            font-family: var(--mono);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            background: rgba(0, 0, 0, 0.45);
            padding: 2px 7px;
            border-radius: 4px;
            pointer-events: none;
        }

        /* Status text below image */
        .cam-footer {
            padding: 9px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cam-result {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cam-result.ok {
            color: var(--success);
        }

        .cam-result.err {
            color: var(--error);
        }

        /* Capture Section */
        .capture-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        #capture-btn {
            position: relative;
            cursor: pointer;
            border: none;
            outline: none;
            background: none;
            padding: 0;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid var(--accent);
            transition: transform 0.3s, opacity 0.3s;
        }

        .btn-ring-outer {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px solid rgba(0, 200, 150, 0.2);
            transition: transform 0.3s;
        }

        .btn-inner {
            width: 124px;
            height: 124px;
            border-radius: 50%;
            background: #142219;
            border: 2px solid rgba(0, 200, 150, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: transform 0.15s, background 0.2s;
            z-index: 1;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            color: var(--accent);
        }

        .btn-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        #capture-btn:hover .btn-inner {
            transform: scale(1.05);
            background: #1a2e22;
        }

        #capture-btn:hover .btn-ring {
            transform: scale(1.07);
            opacity: 0.7;
        }

        #capture-btn:hover .btn-ring-outer {
            transform: scale(1.12);
        }

        #capture-btn:active .btn-inner {
            transform: scale(0.97);
        }

        #capture-btn.loading .btn-ring {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #capture-btn.loading .btn-inner {
            opacity: 0.55;
            pointer-events: none;
        }

        .status-bar {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            height: 20px;
            transition: color 0.3s;
        }

        .status-bar.success {
            color: var(--success);
        }

        .status-bar.error {
            color: var(--error);
        }

        .status-bar.partial {
            color: var(--partial);
        }

        /* Log */
        .log-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .log-header h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-weight: 500;
        }

        .log-count {
            font-family: var(--mono);
            font-size: 11px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--muted);
            border-radius: 4px;
            padding: 2px 6px;
        }

        .log-clear {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 11px;
            font-family: var(--font);
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .log-clear:hover {
            border-color: var(--error);
            color: var(--error);
        }

        #log-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 260px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .log-entry {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 9px 14px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-5px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .log-entry .ts {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
        }

        .log-entry .msg {
            font-size: 12px;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .log-entry .badge {
            font-family: var(--mono);
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .badge-ok {
            background: rgba(0, 200, 150, 0.12);
            color: var(--success);
        }

        .badge-err {
            background: rgba(255, 77, 77, 0.12);
            color: var(--error);
        }

        .badge-partial {
            background: rgba(255, 179, 71, 0.12);
            color: var(--partial);
        }

        .empty-log {
            text-align: center;
            padding: 28px;
            color: var(--muted);
            font-size: 12px;
            font-family: var(--mono);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-dot"></div>
        <h1>ESP32-CAM Dashboard</h1>
        <span id="live-clock">--:--:--</span>
    </header>

    <main>

        <!-- Camera Cards -->
        <div class="cam-grid">

            <!-- CAM 1 -->
            <div class="cam-card" id="cam-card-1">
                <div class="cam-header">
                    <span class="cam-badge">CAM 1</span>
                    <span class="cam-ip">10.132.250.222</span>
                    <span class="cam-status-dot" id="dot-1"></span>
                </div>
                <div class="cam-image-wrap" id="wrap-1">
                    <div class="cam-placeholder" id="placeholder-1">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                            <circle cx="12" cy="13" r="4" />
                        </svg>
                        <span>รอการถ่ายภาพ</span>
                    </div>
                    <img id="img-1" src="" alt="CAM 1" style="display:none;" />
                    <span class="img-ts" id="ts-1" style="display:none;"></span>
                </div>
                <div class="cam-footer">
                    <span class="cam-result" id="result-1">—</span>
                </div>
            </div>

            <!-- CAM 2 -->
            <div class="cam-card" id="cam-card-2">
                <div class="cam-header">
                    <span class="cam-badge">CAM 2</span>
                    <span class="cam-ip">10.132.250.159</span>
                    <span class="cam-status-dot" id="dot-2"></span>
                </div>
                <div class="cam-image-wrap" id="wrap-2">
                    <div class="cam-placeholder" id="placeholder-2">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                            <circle cx="12" cy="13" r="4" />
                        </svg>
                        <span>รอการถ่ายภาพ</span>
                    </div>
                    <img id="img-2" src="" alt="CAM 2" style="display:none;" />
                    <span class="img-ts" id="ts-2" style="display:none;"></span>
                </div>
                <div class="cam-footer">
                    <span class="cam-result" id="result-2">—</span>
                </div>
            </div>

        </div>

        <!-- Capture Button -->
        <div class="capture-section">
            <button id="capture-btn" aria-label="ถ่ายภาพทันที">
                <div class="btn-ring-outer"></div>
                <div class="btn-ring"></div>
                <div class="btn-inner">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                    <span class="btn-label">CAPTURE</span>
                </div>
            </button>
            <div class="status-bar" id="status-bar">กดปุ่มเพื่อถ่ายภาพจากทุกกล้อง</div>
        </div>

        <!-- Log -->
        <div class="log-header">
            <h2>ประวัติการถ่ายภาพ</h2>
            <span class="log-count" id="log-count">0</span>
            <button class="log-clear" onclick="clearLog()">ล้าง</button>
        </div>
        <ul id="log-list">
            <li class="empty-log" id="empty-msg">ยังไม่มีข้อมูล — กดปุ่ม CAPTURE เพื่อเริ่ม</li>
        </ul>

    </main>

    <script>
        // Clock
        function updateClock() {
            document.getElementById('live-clock').textContent =
                new Date().toLocaleTimeString('th-TH', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Show image for a camera after successful capture
        function showImage(camId, timestamp) {
            const placeholder = document.getElementById(`placeholder-${camId}`);
            const img = document.getElementById(`img-${camId}`);
            const tsEl = document.getElementById(`ts-${camId}`);

            // Add cache-busting query so browser re-fetches fresh image
            img.classList.add('loading');
            img.onload = () => { img.classList.remove('loading'); };
            img.onerror = () => { img.style.display = 'none'; placeholder.style.display = 'flex'; };
            img.src = `/image/${camId}?t=${Date.now()}`;
            img.style.display = 'block';
            placeholder.style.display = 'none';

            tsEl.textContent = timestamp.replace('_', ' ');
            tsEl.style.display = 'block';
        }

        // Capture
        const btn = document.getElementById('capture-btn');
        const statusBar = document.getElementById('status-bar');
        let capturing = false;

        btn.addEventListener('click', async () => {
            if (capturing) return;
            capturing = true;
            btn.classList.add('loading');
            statusBar.className = 'status-bar';
            statusBar.textContent = 'กำลังถ่ายภาพ…';

            [1, 2].forEach(id => {
                document.getElementById(`cam-card-${id}`).classList.remove('active');
                document.getElementById(`dot-${id}`).className = 'cam-status-dot';
                const r = document.getElementById(`result-${id}`);
                r.className = 'cam-result';
                r.textContent = 'กำลังดึงภาพ…';
            });

            try {
                const res = await fetch('/capture', { method: 'POST' });
                const data = await res.json();

                data.cameras.forEach(cam => {
                    const card = document.getElementById(`cam-card-${cam.cam_id}`);
                    const dot = document.getElementById(`dot-${cam.cam_id}`);
                    const result = document.getElementById(`result-${cam.cam_id}`);

                    if (cam.status === 'success') {
                        card.classList.add('active');
                        dot.className = 'cam-status-dot ok';
                        result.className = 'cam-result ok';
                        result.textContent = '✓ ' + cam.filename;
                        showImage(cam.cam_id, data.timestamp);
                    } else {
                        dot.className = 'cam-status-dot err';
                        result.className = 'cam-result err';
                        result.textContent = '✗ ' + cam.message;
                    }
                });

                if (data.overall === 'success') {
                    statusBar.className = 'status-bar success';
                    statusBar.textContent = `✓ ถ่ายภาพสำเร็จทุกกล้อง — ${data.timestamp.replace('_', ' ')}`;
                } else if (data.overall === 'partial') {
                    statusBar.className = 'status-bar partial';
                    statusBar.textContent = `⚠ ถ่ายภาพสำเร็จบางกล้อง — ${data.timestamp.replace('_', ' ')}`;
                } else {
                    statusBar.className = 'status-bar error';
                    statusBar.textContent = `✗ ถ่ายภาพไม่สำเร็จ`;
                }

                addLog(data);

            } catch (err) {
                statusBar.className = 'status-bar error';
                statusBar.textContent = '✗ ไม่สามารถเชื่อมต่อ server ได้';
                [1, 2].forEach(id => {
                    document.getElementById(`dot-${id}`).className = 'cam-status-dot err';
                    const r = document.getElementById(`result-${id}`);
                    r.className = 'cam-result err';
                    r.textContent = 'Connection error';
                });
            }

            btn.classList.remove('loading');
            capturing = false;
        });

        // Log
        let logEntries = [];

        function addLog(data) {
            logEntries.unshift(data);
            renderLog();
        }

        function renderLog() {
            document.getElementById('empty-msg')?.remove();
            const list = document.getElementById('log-list');
            list.innerHTML = logEntries.map(entry => {
                const bc = entry.overall === 'success' ? 'badge-ok' : entry.overall === 'partial' ? 'badge-partial' : 'badge-err';
                const bt = entry.overall === 'success' ? 'SUCCESS' : entry.overall === 'partial' ? 'PARTIAL' : 'ERROR';
                const msg = entry.cameras.map(c => `CAM${c.cam_id}: ${c.status === 'success' ? c.filename : c.message}`).join('  ·  ');
                return `<li class="log-entry">
        <span class="ts">${entry.timestamp.replace('_', ' ')}</span>
        <span class="msg">${msg}</span>
        <span class="badge ${bc}">${bt}</span>
      </li>`;
            }).join('');
            document.getElementById('log-count').textContent = logEntries.length;
        }

        function clearLog() {
            logEntries = [];
            document.getElementById('log-list').innerHTML =
                '<li class="empty-log" id="empty-msg">ยังไม่มีข้อมูล — กดปุ่ม CAPTURE เพื่อเริ่ม</li>';
            document.getElementById('log-count').textContent = '0';
        }
    </script>
</body>

</html>
